<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gymGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a3e635;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#65a30d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#0a0a0a"/>
  
  <!-- Dumbbell -->
  <!-- Left weight -->
  <rect x="10" y="35" width="15" height="30" rx="2" fill="url(#gymGradient)"/>
  
  <!-- Left connector -->
  <rect x="25" y="45" width="8" height="10" rx="1" fill="url(#gymGradient)"/>
  
  <!-- Bar -->
  <rect x="33" y="47" width="34" height="6" rx="3" fill="url(#gymGradient)"/>
  
  <!-- Right connector -->
  <rect x="67" y="45" width="8" height="10" rx="1" fill="url(#gymGradient)"/>
  
  <!-- Right weight -->
  <rect x="75" y="35" width="15" height="30" rx="2" fill="url(#gymGradient)"/>
</svg>
